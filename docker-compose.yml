version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: classroom-postgres
    environment:
      POSTGRES_USER: classroom
      POSTGRES_PASSWORD: classroom
      POSTGRES_DB: classroom_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U classroom -d classroom_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./common-api
      dockerfile: Dockerfile
    container_name: classroom-api
    environment:
      DATABASE_URL: postgres://classroom:classroom@postgres:5432/classroom_db?sslmode=disable
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      API_PORT: 8080
      UPLOAD_DIR: /app/uploads
      TEACHER_INVITE_CODE: ${TEACHER_INVITE_CODE:-}
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://openrouter.ai/api/v1/chat/completions}
      AI_MODEL: ${AI_MODEL:-deepseek/deepseek-v4-flash:free}
      AI_APP_NAME: ${AI_APP_NAME:-Classroom MS AI Tutor}
      AI_SITE_URL: ${AI_SITE_URL:-http://localhost:3000}
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: classroom-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
