services:
  - type: web
    name: classroom-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: API_PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: classroom-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: /app/uploads
    healthCheckPath: /health

databases:
  - name: classroom-db
    databaseName: classroom_db
    user: classroom
    plan: free
    postgresMajorVersion: 16
