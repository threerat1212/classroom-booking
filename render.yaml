services:
  - type: web
    name: classroom-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: API_PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: classroom-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: STORAGE_PROVIDER
        value: r2
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_REGION
        value: auto
      - key: R2_PRESIGN_TTL_SECONDS
        value: 900
      - key: TEACHER_INVITE_CODE
        sync: false
      - key: AI_PROVIDER
        value: xiaomi
      - key: AI_API_KEY
        sync: false
      - key: AI_BASE_URL
        value: https://token-plan-sgp.xiaomimimo.com/v1/chat/completions
      - key: AI_MODEL
        value: mimo-v2.5-pro
      - key: AI_GRADING_MODEL
        value: mimo-v2.5-pro
      - key: AI_APP_NAME
        value: Classroom MS AI Tutor
    healthCheckPath: /health

databases:
  - name: classroom-db
    databaseName: classroom_db
    user: classroom
    plan: free
    postgresMajorVersion: 16
